<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secret Agent - Multiplayer Fixed</title>
    <!-- استدعاء أحدث نسخة مستقرة من مكتبة Socket.io المتوافقة مع السيرفر السحابي -->
    <script src="https://socket.io"></script>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050508; font-family: sans-serif; }
        #game-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { background-color: #0b0c10; display: block; max-width: 100%; max-height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,11,14,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; color: #fff; gap: 20px; }
        .btn-ui { padding: 12px 30px; background: #45f3ff; color: #0b0c10; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(69,243,255,0.3); }
        .btn-ui:hover { background: #2dc5cf; }
        #multiplayer-menu { display: none; }
        input { padding: 10px; border-radius: 6px; border: 2px solid #1f2833; background: #141923; color: #fff; text-align: center; font-size: 18px; width: 150px; }
        .mobile-controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        .touch-zone { pointer-events: auto; position: absolute; }
        #joystick-zone { bottom: 40px; right: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #joystick-knob { width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        #actions-zone { bottom: 40px; left: 40px; width: 200px; height: 200px; }
        .action-btn { position: absolute; width: 65px; height: 65px; border-radius: 50%; color: white; border: 2px solid rgba(255,255,255,0.2); font-weight: bold; font-size: 12px; backdrop-filter: blur(5px); pointer-events: auto; opacity: 0.5; }
        #btn-shoot { bottom: 10px; left: 10px; width: 80px; height: 80px; background: rgba(255,56,56,0.3); border-color: #ff3838; font-size: 15px; }
        #btn-skill { bottom: 100px; left: 20px; background: rgba(69,243,255,0.2); }
        #shop-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 360px; height: 75%; background: #0b0c10; border: 2px solid #45f3ff; border-radius: 20px; z-index: 20; color: #fff; overflow: hidden; padding: 20px; }
        .shop-item { background: #1f2833; padding: 15px; border-radius: 10px; margin-bottom: 12px; }
        .progress-bar { width: 100%; height: 8px; background: #050508; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 20%; background: #45f3ff; transition: width 0.2s; }
        #hud { position: absolute; top: 15px; width: 95%; display: flex; justify-content: space-between; pointer-events: none; color: white; font-weight: bold; font-size: 16px; z-index: 5; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="main-menu" class="overlay-screen">
        <h1>العميل السري: العمليات المشتركة</h1>
        <button class="btn-ui" onclick="showMultiplayerMenu()">لعب جماعي (Multiplayer)</button>
    </div>

    <div id="multiplayer-menu" class="overlay-screen">
        <h2>نظام الملتيبلاير الحقيقي</h2>
        <button class="btn-ui" onclick="hostRoom()">إنشاء غرفة جديدة</button>
        <p>أو انضم لصديقك:</p>
        <input type="number" id="room-input" placeholder="كود الغرفة">
        <button class="btn-ui" onclick="joinRoom()">انضم الآن</button>
    </div>

    <div id="wait-screen" class="overlay-screen" style="display:none;">
        <h2 id="wait-status">جاري الاتصال بقنوات المزامنة...</h2>
        <h3 id="room-code-display" style="color:#45f3ff; font-size:32px; margin-top:10px;"></h3>
        <p>انتظر دخول اللاعب الآخر عبر كتابة هذا الكود على شاشته.</p>
    </div>

    <div id="hud">
        <div id="hud-mission">المهمة: انتظر الشريك...</div>
        <div id="hud-money">المحفظة: $0</div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
    // 🚨 الخطوة الأهم: ضع هنا رابط سيرفر Hugging Face الخاص بك (مثال: https://hf.space)
    // تنبيه: تأكد من إزالة المنفذ (:7860) تماماً من نهاية الرابط!
    const SERVER_URL = "https://dark225-test-game.hf.space"; 
    
    let sock;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let gameState = 'menu';
    let isMultiplayer = false;
    let myRoomCode = "";
    let money = 400;

    let player = { x: 100, y: 300, radius: 15, color: '#45f3ff', speed: 4 };
    let partner = { x: -100, y: -100, radius: 15, color: '#a345ff', active: false };
    let guards = [];

    // دالة تهيئة الاتصال متوافقة 100% مع خوادم الـ Reverse Proxy والحماية الذكية
    function initSocket() {
        if (!sock) {
            sock = io(SERVER_URL, {
                transports: ['websocket'], // إجبار الاتصال الفوري المباشر وتجنب التعليق
                upgrade: false,
                secure: true,
                rejectUnauthorized: false,
                reconnection: true
            });

            // عندما يستجيب السيرفر بنجاح بإنشاء غرفة
            sock.on('roomCreated', (data) => {
                myRoomCode = data.roomCode;
                document.getElementById('wait-status').innerText = "تم إنشاء الغرفة! كود الدخول هو:";
                document.getElementById('room-code-display').innerText = myRoomCode;
            });

            // عندما يستقبل كلا الطرفين إشارة بدء اللعبة (تم حل مشكلة التسمية والمزامنة هنا)
            sock.on('gameStarted', (data) => {
                myRoomCode = data.roomCode;
                isMultiplayer = true;
                partner.active = true;
                partner.x = 200; partner.y = 200; // الإحداثيات المبدئية للشريك
                
                // إخفاء كل نوافذ الانتظار وبدء الأكشن فوراً
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('multiplayer-menu').style.display = 'none';
                document.getElementById('wait-screen').style.display = 'none';
                
                gameState = 'playing';
                generateMission();
            });

            // مزامنة حركة اللاعب الشريك عند التحرك
            sock.on('peerMove', (data) => {
                partner.x = data.x;
                partner.y = data.y;
            });
        }
    }

    function showMultiplayerMenu() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('multiplayer-menu').style.display = 'flex';
        initSocket(); // استدعاء فوري لبدء ربط المتصفح بالسيرفر في الخلفية
    }

    function hostRoom() {
        document.getElementById('multiplayer-menu').style.display = 'none';
        document.getElementById('wait-screen').style.display = 'flex';
        if(sock) sock.emit('createRoom');
    }

    function joinRoom() {
        const code = document.getElementById('room-input').value;
        if(code === "") return alert("برجاء إدخال كود الغرفة المكون من 4 أرقام أولاً!");
        if(sock) sock.emit('joinRoom', code);
    }

    function generateMission() {
        guards = [{ x: 400, y: 200, radius: 14, vy: 3, range: 150 }];
        document.getElementById('hud-mission').innerText = `العملية المشتركة حية الآن! تخلص من الحراس.`;
    }

    // إرسال الحركة الحالية للسيرفر لمزامنتها عند الشريك أثناء الضغط على المفاتيح
    window.addEventListener('keydown', (e) => {
        if(gameState !== 'playing') return;
        if(e.key === 'w' || e.key === 'ArrowUp') player.y -= player.speed;
        if(e.key === 's' || e.key === 'ArrowDown') player.y += player.speed;
        if(e.key === 'a' || e.key === 'ArrowLeft') player.x -= player.speed;
        if(e.key === 'd' || e.key === 'ArrowRight') player.x += player.speed;
        
        if(sock && isMultiplayer) {
            sock.emit('playerMove', { roomCode: myRoomCode, x: player.x, y: player.y });
        }
    });

    function updateGame() {
        if(gameState === 'playing') {
            guards.forEach(g => {
                g.y += g.vy;
                if(g.y > 500 || g.y < 100) g.vy *= -1;
            });
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // رسم العميل السري الخاص بك
        ctx.fillStyle = player.color;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
        
        // رسم العميل الشريك (مزامنة الملتيبلاير)
        if(partner.active) {
            ctx.fillStyle = partner.color;
            ctx.beginPath(); ctx.arc(partner.x, partner.y, partner.radius, 0, Math.PI*2); ctx.fill();
        }

        // رسم الحراس الأمنيين
        guards.forEach(g => {
            ctx.fillStyle = '#ff3838';
            ctx.beginPath(); ctx.arc(g.x, g.y, g.radius, 0, Math.PI*2); ctx.fill();
        });

        requestAnimationFrame(updateGame);
    }
    updateGame();
</script>
</body>
</html>
